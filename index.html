<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>えひめアグリファーム 直売所</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #ff9800;
            --bg-color: #f1f8e9;
            --text-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
        }

        header p {
            margin-top: 0.5rem;
            opacity: 0.9;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* 商品紹介セクション */
        .section-title {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid var(--secondary-color);
        }

        .product-card h3 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .price {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--secondary-color);
        }

        /* コメントセクション */
        .comment-section {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .comment-form input,
        .comment-form textarea {
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }

        .comment-form button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .comment-form button:hover {
            background-color: #1b5e20;
        }

        .comment-form button:disabled {
            background-color: #9e9e9e;
            cursor: not-allowed;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .comment-item {
            background: #f9f9f9;
            padding: 1rem;
            border-radius: 4px;
            border-left: 4px solid var(--primary-color);
        }

        .comment-item h4 {
            margin: 0 0 0.5rem 0;
            font-size: 0.9rem;
            color: #666;
        }

        .comment-item p {
            margin: 0;
            line-height: 1.5;
        }
        
        .loading {
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>えひめアグリファーム 直売所</h1>
        <p>農園から食卓へ、新鮮な野菜と果物をお届けします！</p>
    </header>

    <main>
        <!-- 商品紹介 -->
        <h2 class="section-title">本日のおすすめ農産物</h2>
        <div class="products-grid">
            <div class="product-card">
                <h3>温州みかん</h3>
                <p>太陽の光をたっぷり浴びた、甘みと酸味のバランスが絶妙なみかんです。</p>
                <p class="price">1袋 500円</p>
            </div>
            <div class="product-card">
                <h3>完熟トマト</h3>
                <p>センサー管理されたハウスで大切に育てた、甘みが強いフルーツトマトです。</p>
                <p class="price">1パック 350円</p>
            </div>
            <div class="product-card">
                <h3>朝採れきゅうり</h3>
                <p>今朝収穫したばかりのシャキシャキ食感。サラダや漬物にぴったりです。</p>
                <p class="price">3本 200円</p>
            </div>
        </div>

        <!-- 応援コメント掲示板 -->
        <div class="comment-section">
            <h2 class="section-title">農園への応援コメント</h2>
            
            <form id="comment-form" class="comment-form">
                <input type="text" id="comment-name" placeholder="お名前（ニックネーム可）" required>
                <textarea id="comment-text" rows="3" placeholder="美味しかった野菜の感想や応援メッセージをお願いします！" required></textarea>
                <button type="submit" id="submit-btn">コメントを送信</button>
            </form>

            <div id="comments-list" class="comments-list">
                <p class="loading">コメントを読み込んでいます...</p>
            </div>
        </div>
    </main>

    <!-- Firebase v10 SDK の読み込みと設定 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ここに自分のconfigを貼る
        const firebaseConfig = {
          apiKey: "AIzaSyC9gRBdcVr2YxOZwnUrtv7lElP2vFQRR2M",
          authDomain: "sanchoku-79631.firebaseapp.com",
          projectId: "sanchoku-79631",
          storageBucket: "sanchoku-79631.firebasestorage.app",
          messagingSenderId: "815822134191",
          appId: "1:815822134191:web:707f938048dfb511a0ad5a"
        };

        // Firebase初期化
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DOM要素の取得
        const commentForm = document.getElementById('comment-form');
        const nameInput = document.getElementById('comment-name');
        const textInput = document.getElementById('comment-text');
        const commentsList = document.getElementById('comments-list');
        const submitBtn = document.getElementById('submit-btn');

        // コメント一覧を読み込んで表示する関数
        async function loadComments() {
            try {
                // collection(db, "comments") から getDocs + orderBy("createdAt", "desc") で取得
                const q = query(collection(db, "comments"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                // 表示領域をクリア
                commentsList.innerHTML = '';

                if (querySnapshot.empty) {
                    commentsList.innerHTML = '<p class="loading">まだコメントはありません。最初のコメントをお待ちしています！</p>';
                    return;
                }

                // 取得したコメントをDOMに追加
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    const commentItem = document.createElement('div');
                    commentItem.className = 'comment-item';

                    const nameEl = document.createElement('h4');
                    // XSS対策として textContent を使用
                    nameEl.textContent = data.name + " さん";

                    const textEl = document.createElement('p');
                    // XSS対策として textContent を使用
                    textEl.textContent = data.text;

                    commentItem.appendChild(nameEl);
                    commentItem.appendChild(textEl);
                    commentsList.appendChild(commentItem);
                });
            } catch (error) {
                console.error("コメントの取得に失敗しました:", error);
                commentsList.innerHTML = '<p class="loading" style="color: red;">エラーが発生しました。Firebaseの設定（firebaseConfig）やFirestoreのセキュリティルールを確認してください。</p>';
            }
        }

        // フォーム送信時の処理
        commentForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // 画面遷移を防ぐ
            
            const nameVal = nameInput.value.trim();
            const textVal = textInput.value.trim();
            
            if (!nameVal || !textVal) return;

            // 送信中はボタンを無効化
            submitBtn.disabled = true;
            submitBtn.textContent = '送信中...';

            try {
                // collection(db, "comments") に addDoc で保存
                await addDoc(collection(db, "comments"), {
                    name: nameVal,
                    text: textVal,
                    createdAt: serverTimestamp()
                });

                // フォームをクリアして一覧を再読み込み
                nameInput.value = '';
                textInput.value = '';
                await loadComments();
            } catch (error) {
                console.error("コメントの保存に失敗しました:", error);
                alert("送信に失敗しました。Firebaseの設定やセキュリティルールを確認してください。");
            } finally {
                // ボタンを元に戻す
                submitBtn.disabled = false;
                submitBtn.textContent = 'コメントを送信';
            }
        });

        // ページ読み込み時にコメント一覧を取得
        loadComments();
    </script>
</body>
</html>
